name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Validate tag format (X.Y.Z)
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag format: ${GITHUB_REF_NAME}"
            echo "Expected: X.Y.Z (example: 1.2.3)"
            exit 1
          fi

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Validate tag matches mod_version
        run: |
          VERSION=$(grep '^mod_version=' gradle.properties | cut -d= -f2)
          TAG="${GITHUB_REF_NAME}"
          if [ "${VERSION}" != "${TAG}" ]; then
            echo "Tag (${TAG}) must match mod_version (${VERSION}) in gradle.properties"
            exit 1
          fi

      - name: Build
        run: ./gradlew build

      - name: Collect release jars
        run: |
          mkdir -p dist
          cp build/libs/*.jar dist/
          rm -f dist/*-dev.jar dist/*-sources.jar

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/*.jar